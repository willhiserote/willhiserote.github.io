<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Inventory - SpaceOptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Current Inventory</h1>
        <p class="text-muted">Live inventory from Google Sheets.</p>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Current Stock</th>
                </tr>
            </thead>
            <tbody id="inventoryTable"></tbody>
        </table>

        <hr class="my-4">

        <h2>Inventory In/Out</h2>
        <p class="text-muted">Use this to add stock in or remove stock out.</p>
        <form id="adjustForm" class="row g-3">
            <div class="col-md-4">
                <label for="item" class="form-label">Item</label>
                <input id="item" name="item" class="form-control" required placeholder="Shelf">
            </div>
            <div class="col-md-3">
                <label for="quantity" class="form-label">Quantity</label>
                <input type="number" id="quantity" name="quantity" class="form-control" min="1" required>
            </div>
            <div class="col-md-2">
                <label for="direction" class="form-label">Direction</label>
                <select id="direction" name="direction" class="form-select" required>
                    <option value="in">IN</option>
                    <option value="out">OUT</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="notes" class="form-label">Notes</label>
                <input id="notes" name="notes" class="form-control" placeholder="Received shipment">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Submit Adjustment</button>
            </div>
        </form>

        <div id="status" class="mt-3"></div>
    </div>

    <script>
        window.BOT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw414XwgwL-djigV3FLqodp8JxlU5seL4mjNXFJhLOu2gtBi2vFdHJeDE0joNlk82Q8/exec';
    </script>
    <script src="public/js/bot-client.js?v=20260311"></script>
    <script>
        const tableBody = document.getElementById('inventoryTable');
        const status = document.getElementById('status');
        const adjustForm = document.getElementById('adjustForm');

        function setStatus(message, type = 'info') {
            status.innerHTML = `<div class="alert alert-${type}" role="alert">${message}</div>`;
        }

        function drawInventory(items) {
            tableBody.innerHTML = '';
            items.forEach(product => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${product.item}</td><td>${product.stock}</td>`;
                tableBody.appendChild(row);
            });
        }

        async function loadInventory() {
            try {
                const data = await fetchInventory();
                drawInventory(data.inventory || []);
            } catch (error) {
                setStatus(`Could not load inventory: ${error.message}`, 'danger');
            }
        }

        adjustForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(adjustForm);
            const payload = {
                item: formData.get('item'),
                quantity: Number(formData.get('quantity')),
                direction: formData.get('direction'),
                notes: formData.get('notes'),
                source: 'manual'
            };

            try {
                const data = await adjustInventory(payload);
                drawInventory(data.inventory || []);
                adjustForm.reset();
                setStatus('Inventory updated.', 'success');
            } catch (error) {
                setStatus(`Update failed: ${error.message}`, 'danger');
            }
        });

        loadInventory();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
